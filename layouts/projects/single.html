{{ define "main" }}

<div class="container">
    <div class="row pt-4 mb-5 mt-5">
	<div class="col"></div>
	<div class="col-8">
	    {{ $imageAlt := .Params.image_alt | default .Params.imageAlt | default (printf "Cover image for %s" .Title) }}
	    <img class="img-fluid" src="{{ .Params.Image }}" alt="{{ $imageAlt }}" />
	</div>
	<div class="col"></div>
    </div>
</div>


<div class="container">

    <div class="row mt-4">
	<div class="col"></div>
	<div class="col-md-8 pl-4 pr-4">
	    <article class="article">
		{{ .Content }}
	    </article>
	    {{- partial "related-content.html" . -}}
	</div>
	<div class="col"></div>
    </div>
</div>

{{ end }}
