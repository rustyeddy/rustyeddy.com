{{ define "main" }}
<div class="container">

    <div class="row mb-4">
	<div class="col"></div>
	<div class="col-8">
	    <article class="article text-big">
		{{ .Content }}
	    </article>
	</div>
	<div class="col"></div>
    </div>

</div>

<div class="container">

    <div class="row">
	{{ range .Pages }}
	<div class="col-md-4">
	    <div class="card">
		<div class="card-body">
                    {{ $project := . }}
                    {{ $image := .Params.logo | default .Params.image }}
                    {{ with $image }}
                    <img height="315px" class="card-img" src="{{ . }}" alt="{{ $project.Title }} project image" />
                    {{ end }}

		    <h5 class="card-title">
			<a href="{{ .Permalink }}">{{ .Title }}</a>
		    </h5>

		    <div class="card-text">
			{{ .Description }}
			<span><a href="{{ .Permalink }}">read more ...</a></span>
		    </div>

		</div>
	    </div>
	</div>
	{{ end }}
    </div> 

</div>

</div>
{{ end }}
