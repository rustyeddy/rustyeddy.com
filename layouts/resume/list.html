{{ define "main" }}
<div class="container resume-actions text-right">
    <a class="btn btn-outline-secondary btn-sm" href="/resume/?download=pdf">Download PDF</a>
</div>
<div class="resume">
    {{- partial "resume/summary.html" . }}

    {{- partial "resume/skills.html" . }}

    {{- partial "resume/joblist.html" . -}}

    {{- partial "resume/education.html" . -}}

    {{- partial "resume/pubs.html" . -}}
</div>
<script>
  (function () {
    var params = new URLSearchParams(window.location.search);
    if (params.get('download') !== 'pdf') { return; }
    window.addEventListener('load', function () {
      window.print();
    });
  })();
</script>
{{ end }}
