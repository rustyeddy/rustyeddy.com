{{ define "main" }}
<div class="container">

    <div class="row">
	<div class="col"></div>
	<div class="col-lg-8">
	    {{ .Content }}
	</div>
	<div class="col"></div>
    </div>

    {{ if ne .Params.show_articles false }}
    <div class="row">
      {{ range .Pages.ByWeight }}
      <div class="col-md-6 mb-4">
        <div class="card">
          <div class="card-body">
            {{ partial "page-summary.html" (dict "page" . "dateMode" "hide" "termsMode" "show") }}
          </div> <!-- card body -->
        </div> <!-- card -->
      </div> <!-- col-md-6 -->
      {{ end }}
    </div> <!-- row -->
    {{ end }}
</div>

<div class="container mt-4">
    <div class="row">
        <div class="col"></div>
        <div class="col-8">
            <script async data-uid="50dfcceaf3" src="https://skilled-producer-5787.ck.page/50dfcceaf3/index.js"></script>
        </div>
        <div class="col"></div>
    </div>
</div>
{{ end }}
